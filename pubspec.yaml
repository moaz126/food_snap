name: food_snap
description: FoodSnap - AI powered food nutrition analyzer
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  http: ^1.2.1
  flutter_dotenv: ^5.1.0
  uuid: ^4.4.0
  intl: ^0.19.0
  go_router: ^14.2.0
  get_it: ^7.7.0
  injectable: ^2.5.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.3
  flutter_lints: ^3.0.2
  injectable_generator: ^2.6.2
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  
  remove_alpha_ios: true
  background_color_ios: "#185FA5"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
